        let activeId = 1;
        let zoomLevel = 100;
        let isDarkBackground = true;
        
        // Pan & Zoom state
        let isDragging = false;
        let startX, startY, translateX = 0, translateY = 0;
        
        const diagramListEl = document.getElementById('diagramList');
        const searchBar = document.getElementById('searchBar');
        const currentTitleEl = document.getElementById('currentTitle');
        const diagramImageEl = document.getElementById('diagramImage');
        const downloadSvgEl = document.getElementById('downloadSvg');
        const downloadPngEl = document.getElementById('downloadPng');
        const diagramExplanationEl = document.getElementById('diagramExplanation');
        const rawUmlCodeEl = document.getElementById('rawUmlCode');
        const copyCodeBtn = document.getElementById('copyCodeBtn');
        const toastEl = document.getElementById('toast');
        const bgToggleBtn = document.getElementById('bgToggle');
        
        const container = document.getElementById('diagramContainer');
        const viewport = document.getElementById('viewport');
        const zoomBadge = document.getElementById('zoomBadge');

        // Initialize App
        function init() {
            renderList(DIAGRAMS_DATA);
            loadDiagram(activeId);
            setupEventListeners();
        }

        // Render Sidebar Menu
        function renderList(items) {
            diagramListEl.innerHTML = '';
            items.forEach(item => {
                const li = document.createElement('li');
                li.className = `diagram-item ${item.id === activeId ? 'active' : ''}`;
                li.setAttribute('data-id', item.id);
                li.innerHTML = `
                    <div class="diagram-number">${item.id}</div>
                    <div class="diagram-item-info">
                        <div class="diagram-item-title">${item.title.replace(/^\d+️⃣?\s*/, '')}</div>
                    </div>
                `;
                li.addEventListener('click', () => {
                    document.querySelectorAll('.diagram-item').forEach(el => el.classList.remove('active'));
                    li.classList.add('active');
                    loadDiagram(item.id);
                });
                diagramListEl.appendChild(li);
            });
        }

        // Load Diagram details
        function loadDiagram(id) {
            activeId = id;
            const diagram = DIAGRAMS_DATA.find(d => d.id === id);
            if (!diagram) return;

            currentTitleEl.innerHTML = `<i class="fa-solid fa-diagram-project" style="color: var(--accent-color);"></i> ${diagram.title}`;
            diagramImageEl.src = diagram.svg_path;
            
            // Wait for image load to center it and reset transform
            diagramImageEl.onload = function() {
                resetZoom();
            };

            downloadSvgEl.href = diagram.svg_path;
            downloadPngEl.href = diagram.png_path;
            diagramExplanationEl.innerHTML = diagram.explanation;
            rawUmlCodeEl.textContent = diagram.raw_uml;
            
            // Sync active item in sidebar if search was active
            document.querySelectorAll('.diagram-item').forEach(el => {
                if (parseInt(el.getAttribute('data-id')) === id) {
                    el.classList.add('active');
                } else {
                    el.classList.remove('active');
                }
            });
        }

        // Tabs switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            // Activate current
            event.currentTarget.classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');
        }

        // Search feature
        searchBar.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = DIAGRAMS_DATA.filter(d => 
                d.title.toLowerCase().includes(query) || 
                d.explanation.toLowerCase().includes(query)
            );
            renderList(filtered);
        });

        // Fullscreen functionality
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                if (viewport.requestFullscreen) {
                    viewport.requestFullscreen();
                } else if (viewport.mozRequestFullScreen) {
                    viewport.mozRequestFullScreen();
                } else if (viewport.webkitRequestFullscreen) {
                    viewport.webkitRequestFullscreen();
                } else if (viewport.msRequestFullscreen) {
                    viewport.msRequestFullscreen();
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }

        // Setup Zoom & Pan
        function setupEventListeners() {
            // Zoom Controls
            document.getElementById('zoomIn').addEventListener('click', () => zoom(1.2));
            document.getElementById('zoomOut').addEventListener('click', () => zoom(0.8));
            document.getElementById('zoomReset').addEventListener('click', resetZoom);
            
            // Fullscreen Controls
            const fullscreenToggleBtn = document.getElementById('fullscreenToggle');
            const floatFullscreenToggleBtn = document.getElementById('floatFullscreenToggle');

            function updateFullscreenUI() {
                const isFullscreen = !!document.fullscreenElement;
                const iconClass = isFullscreen ? 'fa-compress' : 'fa-expand';
                const text = isFullscreen ? 'شاشة عادية' : 'ملء الشاشة';
                const titleText = isFullscreen ? 'خروج من ملء الشاشة' : 'ملء الشاشة';

                if (fullscreenToggleBtn) {
                    const iconEl = fullscreenToggleBtn.querySelector('i');
                    const svgEl = fullscreenToggleBtn.querySelector('svg');
                    const textEl = fullscreenToggleBtn.querySelector('span');
                    if (iconEl) iconEl.className = `fa-solid ${iconClass}`;
                    if (svgEl) {
                        if (isFullscreen) {
                            // compress path
                            svgEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9L4.5 4.5M9 9V4.5M9 9H4.5m6 6l4.5 4.5m-4.5-4.5v4.5m0-4.5h4.5M9 15l-4.5 4.5M9 15v4.5M9 15H4.5m6-6l4.5-4.5m-4.5 4.5V4.5m0 4.5h4.5" />';
                        } else {
                            // expand path
                            svgEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 3.75h4.5m-4.5 0v4.5m0-4.5L9 9m11.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15M3.75 20.25h4.5m-4.5 0v-4.5m0 4.5L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9" />';
                        }
                    }
                    if (textEl) textEl.textContent = text;
                    fullscreenToggleBtn.title = titleText;
                }
                
                if (floatFullscreenToggleBtn) {
                    const iconEl = floatFullscreenToggleBtn.querySelector('i');
                    const svgEl = floatFullscreenToggleBtn.querySelector('svg');
                    if (iconEl) iconEl.className = `fa-solid ${iconClass}`;
                    if (svgEl) {
                        if (isFullscreen) {
                            // compress path
                            svgEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 9L4.5 4.5M9 9V4.5M9 9H4.5m6 6l4.5 4.5m-4.5-4.5v4.5m0-4.5h4.5M9 15l-4.5 4.5M9 15v4.5M9 15H4.5m6-6l4.5-4.5m-4.5 4.5V4.5m0 4.5h4.5" />';
                        } else {
                            // expand path
                            svgEl.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3.75 3.75h4.5m-4.5 0v4.5m0-4.5L9 9m11.25 11.25h-4.5m4.5 0v-4.5m0 4.5L15 15M3.75 20.25h4.5m-4.5 0v-4.5m0 4.5L9 15M20.25 3.75h-4.5m4.5 0v4.5m0-4.5L15 9" />';
                        }
                    }
                    floatFullscreenToggleBtn.title = titleText;
                }
            }

            if (fullscreenToggleBtn) {
                fullscreenToggleBtn.addEventListener('click', toggleFullscreen);
            }
            if (floatFullscreenToggleBtn) {
                floatFullscreenToggleBtn.addEventListener('click', toggleFullscreen);
            }

            // Double click to toggle fullscreen on viewport (excluding controls)
            viewport.addEventListener('dblclick', (e) => {
                if (e.target.closest('.control-btn') || e.target.closest('.btn') || e.target.closest('.floating-controls')) {
                    return;
                }
                toggleFullscreen();
            });

            document.addEventListener('fullscreenchange', updateFullscreenUI);
            document.addEventListener('webkitfullscreenchange', updateFullscreenUI);
            document.addEventListener('mozfullscreenchange', updateFullscreenUI);
            document.addEventListener('MSFullscreenChange', updateFullscreenUI);
            
            // Toggle Background color behind image
            bgToggleBtn.addEventListener('click', () => {
                isDarkBackground = !isDarkBackground;
                if (isDarkBackground) {
                    viewport.style.background = 'radial-gradient(circle at center, rgba(17, 24, 39, 0.3) 0%, rgba(11, 15, 25, 0.8) 100%)';
                    diagramImageEl.style.filter = 'drop-shadow(0 10px 20px rgba(0,0,0,0.5))';
                } else {
                    viewport.style.background = '#ffffff';
                    diagramImageEl.style.filter = 'none';
                }
            });

            // Dragging (Panning)
            container.addEventListener('mousedown', (e) => {
                if (e.target.tagName === 'BUTTON') return;
                isDragging = true;
                startX = e.clientX - translateX;
                startY = e.clientY - translateY;
                container.style.transition = 'none'; // Disable transition during drag
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                translateX = e.clientX - startX;
                translateY = e.clientY - startY;
                updateTransform();
            });

            window.addEventListener('mouseup', () => {
                if (isDragging) {
                    isDragging = false;
                    container.style.transition = 'transform 0.1s ease-out';
                }
            });

            // Wheel zoom
            viewport.addEventListener('wheel', (e) => {
                e.preventDefault();
                const zoomFactor = e.deltaY < 0 ? 1.1 : 0.9;
                zoom(zoomFactor);
            });

            // Copy Code
            copyCodeBtn.addEventListener('click', () => {
                const umlText = rawUmlCodeEl.textContent;
                navigator.clipboard.writeText(umlText).then(() => {
                    showToast('تم نسخ الكود الأكاديمي بنجاح');
                });
            });
        }

        function zoom(factor) {
            const nextZoom = Math.round(zoomLevel * factor);
            if (nextZoom >= 20 && nextZoom <= 500) {
                zoomLevel = nextZoom;
                zoomBadge.textContent = `${zoomLevel}%`;
                updateTransform();
            }
        }

        function resetZoom() {
            zoomLevel = 100;
            translateX = 0;
            translateY = 0;
            zoomBadge.textContent = '100%';
            updateTransform();
        }

        function updateTransform() {
            container.style.transform = `translate(${translateX}px, ${translateY}px) scale(${zoomLevel / 100})`;
        }

        function showToast(msg) {
            document.getElementById('toastMsg').textContent = msg;
            toastEl.classList.add('show');
            setTimeout(() => {
                toastEl.classList.remove('show');
            }, 3000);
        }

        // Initialize on load
        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
